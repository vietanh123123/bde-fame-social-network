name: tests

# Run the Django test suite on every pull request (and on pushes to main).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv
        run: pip install --user pipenv

      - name: Install dependencies
        # --deploy fails fast if Pipfile.lock is out of sync with the Pipfile.
        run: pipenv install --deploy --dev

      - name: Run tests
        run: pipenv run python manage.py test --verbosity 2
